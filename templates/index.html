<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Driving Assistant & Copilot</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #0a0e17;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.4);
            --secondary: #7000ff;
            --success: #00e676;
            --warning: #ffb300;
            --danger: #ff1744;
            --text-main: #f0f4f8;
            --text-muted: #8b9bb4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 15% 50%, rgba(112, 0, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.08), transparent 25%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .navbar {
            padding: 1.5rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-brand i {
            color: var(--primary);
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        .main-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            padding: 2rem 3rem;
            flex-grow: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Controls */
        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .glass-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Status Indicator */
        .status-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .status-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--success);
            box-shadow: 0 0 15px var(--success);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .status-box.level-1::before {
            background: var(--warning);
            box-shadow: 0 0 15px var(--warning);
        }

        .status-box.level-2::before,
        .status-box.level-3::before {
            background: var(--danger);
            box-shadow: 0 0 15px var(--danger);
        }

        .status-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .status-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--success);
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.4);
            transition: color 0.3s ease;
        }

        .status-box.level-1 .status-value {
            color: var(--warning);
            text-shadow: 0 0 10px rgba(255, 179, 0, 0.4);
        }

        .status-box.level-2 .status-value,
        .status-box.level-3 .status-value {
            color: var(--danger);
            text-shadow: 0 0 10px rgba(255, 23, 68, 0.4);
        }

        .ear-metric {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Tabs */
        .tab-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 500;
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            transform: scaleX(0);
            transition: transform 0.3s ease;
            box-shadow: 0 -2px 10px var(--primary-glow);
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            transform: scaleX(1);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease forwards;
            height: calc(100% - 60px);
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Video Feed */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            max-height: 50vh;
            aspect-ratio: 16/9;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transform: scaleX(-1);
            /* Mirror camera */
        }

        /* Chatbot */
        .chat-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.15);
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .msg-assistant {
            align-self: flex-start;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(112, 0, 255, 0.15));
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-bottom-right-radius: 4px;
        }

        .msg-source {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px dashed var(--glass-border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .chat-input-area {
            display: flex;
            gap: 0.8rem;
        }

        .btn-glow {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 0 1.5rem;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4);
        }

        .start-btn {
            background: var(--primary);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            width: 100%;
        }

        .stop-btn {
            background: var(--danger);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            width: 100%;
        }

        @media (max-width: 992px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .chat-area,
            .video-wrapper {
                min-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 1.5rem;
            }

            .navbar-brand {
                font-size: 1.2rem;
            }

            .main-container {
                padding: 1rem;
                gap: 1rem;
            }

            .glass-panel {
                padding: 1rem;
            }

            .chat-area,
            .video-wrapper {
                min-height: 300px;
            }
            
            .tab-btn {
                padding: 0.6rem 1rem;
                font-size: 0.95rem;
            }
        }
        
        @media (max-width: 480px) {
            .chat-area,
            .video-wrapper {
                min-height: 250px;
            }
            
            .status-value {
                font-size: 1.5rem;
            }
            
            .navbar {
                justify-content: center;
            }
        }
        
        /* Modern Media Player */
        .modern-media-player {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: white;
            position: relative;
            margin-top: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .mmp-art {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .mmp-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .mmp-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        .mmp-source {
            font-size: 0.7rem;
            color: #b3b3b3;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 2px;
        }
        .mmp-title {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 1px;
            color: #ffffff;
        }
        .mmp-artist {
            font-size: 0.8rem;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mmp-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-right: 18px;
        }
        .mmp-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: transform 0.1s;
        }
        .mmp-btn:active {
            transform: scale(0.9);
        }
        .mmp-btn.play-pause {
            font-size: 1.4rem;
        }
        .mmp-btn:hover {
            color: #e0e0e0;
        }
        .mmp-expand {
            position: absolute;
            top: 14px;
            right: 14px;
            color: #b3b3b3;
            font-size: 0.85rem;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <i class="fa-solid fa-shield-halved"></i>
            DriveGuard Copilot
        </div>
    </nav>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="glass-panel">
            <div class="panel-header">
                <i class="fa-solid fa-sliders"></i> Configuration
            </div>

            <button id="startAppBtn" class="start-btn">Start Camera & Microphone</button>
            <button id="stopAppBtn" class="stop-btn" style="display: none;">Stop Camera & Microphone</button>

            <div class="status-box" id="statusContainer">
                <div class="status-title">System Status</div>
                <div class="status-value" id="statusIndicator">AWAKE</div>
                <div class="ear-metric">
                    <span>Eye Aspect Ratio:</span>
                    <strong id="earValue" style="color: var(--text-main);">1.00</strong>
                </div>
                <div class="ear-metric mt-1" style="font-size: 0.8rem;">
                    <span>Drowsy Events:</span>
                    <strong id="drowsyEvents" style="color: var(--text-main);">0</strong>
                </div>
            </div>

            <!-- MODERN MEDIA PLAYER -->
            <div class="modern-media-player" id="custom-media-player" style="display:none;">
                <div class="mmp-art">
                    <img src="https://via.placeholder.com/60" alt="Album Art" id="mmp-thumbnail">
                </div>
                <div class="mmp-info">
                    <div class="mmp-source">
                        <i class="fa-regular fa-circle-play"></i> This copilot
                    </div>
                    <div class="mmp-title" id="mmp-title">Unknown Song</div>
                    <div class="mmp-artist" id="mmp-artist">Unknown Artist</div>
                </div>
                <div class="mmp-controls">
                    <button class="mmp-btn play-pause" id="mmp-play-pause" onclick="toggleMmpPlay()"><i class="fa-solid fa-pause"></i></button>
                </div>
                <div class="mmp-expand">
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="glass-panel">
            <div class="tab-nav">
                <button class="tab-btn active" data-target="vision-tab">
                    <i class="fa-solid fa-video"></i> Drive Guard
                </button>
                <button class="tab-btn" data-target="chat-tab">
                    <i class="fa-solid fa-robot"></i> Copilot AI
                </button>
            </div>

            <!-- Vision Tab -->
            <div class="tab-content active" id="vision-tab">
                <div class="video-wrapper">
                    <video id="videoElement" autoplay playsinline muted></video>
                    <canvas id="overlayCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); pointer-events: none;"></canvas>
                    <canvas id="canvasElement" style="display:none;"></canvas>
                </div>
            </div>



            <!-- NATIVE AUDIO PLAYER -->
            <audio id="native-audio" style="display:none;"></audio>

            <!-- Chat Tab -->
            <div class="tab-content" id="chat-tab">
                <div class="chat-area" id="chatHistory">
                    <div class="message msg-assistant">
                        <i class="fa-solid fa-robot" style="color: var(--primary); margin-right: 8px;"></i>
                        System online. I am your Safe Driving Copilot. Ask me about driving rules, emergency protocols,
                        or best practices.
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="glass-input" placeholder="Ask a question..."
                        style="flex-grow: 1;">
                    <button class="btn-glow" id="sendBtn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- No external iframe scripts needed -->
    <script>
        // Tab Navigation
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });

        // Chat UI Logic
        const chatHistory = document.getElementById('chatHistory');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        function appendMessage(role, content, source = null) {
            const div = document.createElement('div');
            div.className = `message msg-${role}`;

            let formattedContent = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formattedContent = formattedContent.replace(/\n/g, '<br>');

            div.innerHTML = formattedContent;

            if (source && role === 'assistant') {
                const srcDiv = document.createElement('div');
                srcDiv.className = 'msg-source';
                srcDiv.innerHTML = `<strong>Knowledge Source:</strong><br>${source.replace(/\n/g, '<br>')}`;
                div.appendChild(srcDiv);
            }

            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // --- Hardware APIs (Camera, Mic, Speakers) ---
        let isHardwareActive = false;
        let isSpeaking = false;
        let cameraInterval = null;
        let recognition = null;


        // --- NATIVE AUDIO API ---
        const nativeAudio = document.getElementById('native-audio');
        let isMmpPlaying = false;

        nativeAudio.addEventListener('play', () => {
            document.getElementById('mmp-play-pause').innerHTML = '<i class="fa-solid fa-pause"></i>';
            isMmpPlaying = true;
        });

        nativeAudio.addEventListener('pause', () => {
            document.getElementById('mmp-play-pause').innerHTML = '<i class="fa-solid fa-play"></i>';
            isMmpPlaying = false;
        });

        nativeAudio.addEventListener('ended', () => {
            document.getElementById('mmp-play-pause').innerHTML = '<i class="fa-solid fa-play"></i>';
            isMmpPlaying = false;
            if (currentQueue.length > currentQueueIndex + 1) {
                currentQueueIndex++;
                playNativeAudio(currentQueue[currentQueueIndex], "Up Next...");
            }
        });

        let currentQueue = [];
        let currentQueueIndex = 0;
        let currentExtractionId = 0;

        function toggleMmpPlay() {
            if (isMmpPlaying) {
                nativeAudio.pause();
            } else {
                nativeAudio.play();
            }
        }

        async function playNativeAudio(videoId, titleGuess) {
            const extractionId = ++currentExtractionId;
            try { nativeAudio.pause(); } catch(e) {}
            
            document.getElementById('custom-media-player').style.display = 'flex';
            document.getElementById('mmp-thumbnail').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            document.getElementById('mmp-title').innerText = "Extracting Stream...";
            document.getElementById('mmp-artist').innerText = titleGuess || "Loading";
            document.getElementById('mmp-play-pause').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            
            try {
                const res = await fetch(`/api/music_url?video_id=${videoId}`);
                const data = await res.json();
                
                // Abort if the user requested another song while this one was extracting
                if (extractionId !== currentExtractionId) return;
                
                if (data.url) {
                    nativeAudio.src = data.url;
                    nativeAudio.volume = 1.0;
                    nativeAudio.play();
                    document.getElementById('mmp-title').innerText = data.title || titleGuess;
                    document.getElementById('mmp-artist').innerText = data.artist || "yt-dlp Engine";
                    if (data.thumbnail) {
                        document.getElementById('mmp-thumbnail').src = data.thumbnail;
                    }
                } else {
                    document.getElementById('mmp-title').innerText = "Stream Failed";
                    document.getElementById('mmp-play-pause').innerHTML = '<i class="fa-solid fa-xmark"></i>';
                }
            } catch (err) {
                console.error("Audio fetch error:", err);
                document.getElementById('mmp-title').innerText = "Network Error";
                document.getElementById('mmp-play-pause').innerHTML = '<i class="fa-solid fa-xmark"></i>';
            }
        }

        // Pre-load voices on page load
        let availableVoices = [];
        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
        }
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // TTS Engine
        function speakOutLoud(text) {
            if (!text) return;
            // Filter out markdown
            const cleanText = text.replace(/\*\*/g, '').replace(/\*/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);

            // Try to find a good voice
            const voices = availableVoices.length > 0 ? availableVoices : window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Zira') || v.name.includes('Female')) || voices[0];
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            utterance.rate = 1.1;

            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => { isSpeaking = false; };
            utterance.onerror = () => { isSpeaking = false; };

            window.speechSynthesis.speak(utterance);
        }

        // Voice Recognition
        function startListeningLoop() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                console.error("Speech recognition not supported.");
                return;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = async (event) => {
                if (isSpeaking) return; // Don't listen to ourselves

                const transcript = event.results[0][0].transcript;
                console.log("Heard:", transcript);

                try {
                    const res = await fetch('/api/voice', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: transcript })
                    });
                    const data = await res.json();

                    if (data.speak) {
                        speakOutLoud(data.speak);
                    }
                    if (data.action === "play_native" && data.video_ids && data.video_ids.length > 0) {
                        currentQueue = data.video_ids;
                        currentQueueIndex = 0;
                        playNativeAudio(currentQueue[currentQueueIndex], data.title);
                    } else if (data.action === "pause_native") {
                        nativeAudio.pause();
                    } else if (data.action === "resume_native") {
                        nativeAudio.play();
                    } else if (data.action === "stop_native") {
                        nativeAudio.pause();
                        nativeAudio.currentTime = 0;
                        document.getElementById('custom-media-player').style.display = 'none';
                    } else if (data.action === "next_native") {
                        if (currentQueue.length > currentQueueIndex + 1) {
                            currentQueueIndex++;
                            playNativeAudio(currentQueue[currentQueueIndex], "Up Next...");
                        } else {
                            appendMessage('assistant', "End of queue reached.");
                        }
                    } else if (data.action === "prev_native") {
                        if (currentQueueIndex > 0) {
                            currentQueueIndex--;
                            playNativeAudio(currentQueue[currentQueueIndex], "Going Back...");
                        } else {
                            appendMessage('assistant', "No previous song in queue.");
                        }
                    } else if (data.action === "vol_up_native") {
                        nativeAudio.volume = Math.min(1.0, nativeAudio.volume + 0.2);
                    } else if (data.action === "vol_down_native") {
                        nativeAudio.volume = Math.max(0.0, nativeAudio.volume - 0.2);
                    } else if (data.action === "mute_native") {
                        nativeAudio.muted = true;
                    } else if (data.action === "unmute_native") {
                        nativeAudio.muted = false;
                    } else if (data.action === "open_url" && data.url) {
                        let newWin = window.open(data.url, "_blank");
                        if (!newWin || newWin.closed || typeof newWin.closed == 'undefined') {
                            // Popup blocked
                            appendMessage('system', `⚠️ **Popup Blocked**<br>I tried to open the song, but your browser blocked it.<br><a href="${data.url}" target="_blank" style="color:var(--primary); font-weight:bold; font-size:1.1rem;">👉 Click Here to Open YouTube Music</a>`);
                        }
                    }
                    if (data.text) {
                        appendMessage('assistant', data.text);
                    }
                } catch (e) {
                    console.error("Voice API error", e);
                }
            };

            recognition.onend = () => {
                if (isHardwareActive) {
                    recognition.start(); // Loop continuously
                }
            };

            recognition.onerror = (e) => {
                console.error("Mic error:", e.error);
                if (e.error === 'not-allowed') {
                    isHardwareActive = false;
                }
            };

            recognition.start();
        }

        // Camera Loop
        async function startCameraLoop() {
            const video = document.getElementById('videoElement');
            const canvas = document.getElementById('canvasElement');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera access denied", err);
                return;
            }

            // Loop every ~333ms (3 FPS)
            if (cameraInterval) clearInterval(cameraInterval);
            cameraInterval = setInterval(async () => {
                if (!isHardwareActive) return;

                if (video.videoWidth > 0) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Compress image to base64
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

                    try {
                        const res = await fetch('/api/frame', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: dataUrl })
                        });
                        const data = await res.json();

                        // Update UI
                        document.getElementById('earValue').innerText = data.ear.toFixed(2);
                        document.getElementById('drowsyEvents').innerText = data.drowsy_counter;

                        const statusIndicator = document.getElementById('statusIndicator');
                        const statusContainer = document.getElementById('statusContainer');
                        statusContainer.className = 'status-box'; // Reset

                        if (data.state === "NORMAL") {
                            statusIndicator.innerText = "AWAKE";
                        } else if (data.state === "LEVEL_1") {
                            statusContainer.classList.add('level-1');
                            statusIndicator.innerText = "DROWSY";
                        } else if (data.state === "LEVEL_2" || data.state === "LEVEL_3") {
                            statusContainer.classList.add('level-3');
                            statusIndicator.innerText = "CRITICAL";
                        }

                        // Draw eye annotations
                        const overlay = document.getElementById('overlayCanvas');
                        if (overlay) {
                            const octx = overlay.getContext('2d');
                            if (overlay.width !== video.videoWidth) {
                                overlay.width = video.videoWidth;
                                overlay.height = video.videoHeight;
                            }
                            octx.clearRect(0, 0, overlay.width, overlay.height);
                            
                            if (data.left_eye && data.right_eye && data.left_eye.length > 0) {
                                octx.strokeStyle = data.ear < 0.22 ? 'red' : 'lime';
                                octx.lineWidth = 2;
                                
                                const drawEye = (pts) => {
                                    if (!pts || pts.length === 0) return;
                                    octx.beginPath();
                                    octx.moveTo(pts[0][0], pts[0][1]);
                                    for (let i = 1; i < pts.length; i++) {
                                        octx.lineTo(pts[i][0], pts[i][1]);
                                    }
                                    octx.closePath();
                                    octx.stroke();
                                };
                                
                                drawEye(data.left_eye);
                                drawEye(data.right_eye);
                            }
                        }

                        // Speak alert if triggered
                        if (data.alert) {
                            speakOutLoud(data.alert);
                        }

                        if (data.action === "call_emergency") {
                            if (navigator.geolocation) {
                                navigator.geolocation.getCurrentPosition((position) => {
                                    const lat = position.coords.latitude;
                                    const lng = position.coords.longitude;
                                    const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                                    appendMessage('assistant', `⚠️ **EMERGENCY** ⚠️<br>Broadcasting location:<br><a href="${mapsUrl}" target="_blank" style="color:var(--primary)">${mapsUrl}</a>`);
                                    window.location.href = "tel:112";
                                }, () => {
                                    window.location.href = "tel:112";
                                });
                            } else {
                                window.location.href = "tel:112";
                            }
                        }

                    } catch (err) {
                        console.error("Frame API error", err);
                    }
                }
            }, 333);
        }

        // Start Hardware
        document.getElementById('startAppBtn').addEventListener('click', () => {
            isHardwareActive = true;
            document.getElementById('startAppBtn').style.display = 'none';
            document.getElementById('stopAppBtn').style.display = 'block';
            // Pre-load voices
            window.speechSynthesis.getVoices();
            startCameraLoop();
            startListeningLoop();
            speakOutLoud("System initialized. Camera and microphone active.");
        });

        // Stop Hardware
        document.getElementById('stopAppBtn').addEventListener('click', () => {
            isHardwareActive = false;
            document.getElementById('stopAppBtn').style.display = 'none';
            document.getElementById('startAppBtn').style.display = 'block';
            
            // Stop Video Tracks
            const video = document.getElementById('videoElement');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            
            if (cameraInterval) {
                clearInterval(cameraInterval);
                cameraInterval = null;
            }
            
            // Stop Audio Recognition
            if (recognition) {
                try {
                    recognition.stop();
                } catch(e) {}
            }
            
            // Clear Overlay
            const overlay = document.getElementById('overlayCanvas');
            if (overlay) {
                const octx = overlay.getContext('2d');
                octx.clearRect(0, 0, overlay.width, overlay.height);
            }
            
            speakOutLoud("Hardware disconnected.");
        });

        // Manual Text Chat
        async function sendTextMessage() {
            const prompt = chatInput.value.trim();
            if (!prompt) return;

            appendMessage('user', prompt);
            chatInput.value = '';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message msg-assistant typing';
            typingDiv.innerHTML = '<i class="fa-solid fa-ellipsis fa-fade"></i>';
            chatHistory.appendChild(typingDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();

                chatHistory.removeChild(typingDiv);

                if (data.error) {
                    appendMessage('assistant', `Error: ${data.error}`);
                } else {
                    appendMessage('assistant', data.response);
                    if (data.speak) speakOutLoud(data.speak);
                }
            } catch (err) {
                chatHistory.removeChild(typingDiv);
                appendMessage('assistant', `Connection error: ${err.message}`);
            }
        }

        sendBtn.addEventListener('click', sendTextMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendTextMessage();
        });

    </script>
</body>
